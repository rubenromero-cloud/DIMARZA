<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Andamios</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .contenedor {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 600px;
    }

    h1 {
      margin-bottom: 10px;
      color: #1a73e8;
    }

    .sub {
      margin-bottom: 30px;
      color: #6b7280;
    }

    .botones {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    a {
      text-decoration: none;
    }

    .btn {
      display: block;
      padding: 14px;
      border-radius: 10px;
      font-weight: bold;
      background: #1a73e8;
      color: white;
      transition: 0.2s;
    }

    .btn:hover {
      background: #1558b0;
    }
  </style>
</head>
<body>

  <div class="contenedor">
    <h1>ANDAMIOS</h1>
    <div class="sub">Seleccione una opción</div>

    <div class="botones">
      <a class="btn" href="inventario.html">Inventario</a>
      <a class="btn" href="evaluacion.html">Evaluación de Desempeño</a>
    </div>
  </div>

</body>
</html>
